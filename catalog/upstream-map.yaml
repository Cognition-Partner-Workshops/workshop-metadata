# upstream-map.yaml
#
# Canonical mapping of every repo in the Cognition-Partner-Workshops org
# to its original upstream source and cluster membership.
#
# HOW TO USE THIS FILE
# --------------------
# - "upstream" is the GitHub owner/repo the code was originally imported from.
#   null means the repo was scaffolded from scratch for workshops.
# - "import_method" tells you how it got here:
#     github-fork   = GitHub fork (parent link preserved, visible in GitHub UI)
#     clone-and-push = cloned upstream, re-pushed under a new repo name
#                      (no GitHub parent link; shares initial commit with upstream)
#     original      = written from scratch for this org
# - "cluster" groups repos that are related by shared git history OR shared
#   application/project. Use this to understand which repos go together.
#
# KEEPING REPOS IN SYNC
# ---------------------
# We intentionally do NOT mirror or auto-sync between clustered repos.
# Each repo in a cluster is meant to diverge from the upstream (and from
# each other) because different workshop labs start from the same codebase
# but have different objectives. Mirrors would overwrite lab-specific
# changes.
#
# Instead we track relationships here so you can:
#   1. Find all repos derived from the same source
#   2. Compare divergence:  git remote add upstream <url> && git fetch upstream
#   3. Cherry-pick upstream fixes when needed
#
# To add an upstream remote to a local clone for comparison:
#   git remote add upstream https://github.com/<upstream>
#   git fetch upstream
#   git log --oneline upstream/main..HEAD   # see local-only commits
#
# WHEN TO UPDATE THIS FILE
# ------------------------
# - When a new repo is added to the org
# - When a repo is archived or removed
# - When a cluster relationship is discovered or changes

# ============================================================
# Clusters — groups of related repos
# ============================================================
clusters:

  C1:
    label: "Spring Boot RealWorld (gothinkster)"
    upstream: gothinkster/spring-boot-realworld-example-app
    shared_initial_commit: ee946e371b7a
    reason: >
      Labs 2 and 3 both start from the same Spring Boot 2.6.3 monolith
      but have different objectives (framework upgrade vs. CVE remediation).
      The original import is also retained with ts- prefix.
    repos:
      - ts-java-spring-boot-realworld-example-app   # original import (renamed)
      - uc-cve-remediation-regulatory-compliance     # Lab 3: security
      - uc-framework-upgrade-monolith-to-microservices  # Lab 2: upgrade

  C2:
    label: "AWS CardDemo (COBOL mainframe)"
    upstream: aws-samples/aws-mainframe-modernization-carddemo
    shared_initial_commit: 6c04f7b12043
    reason: >
      Lab 1 uses a dedicated copy for COBOL-to-Java migration.
      The original fork is also retained.
    repos:
      - aws-mainframe-modernization-carddemo         # original fork
      - uc-legacy-modernization-cobol-to-java         # Lab 1: COBOL migration

  C3:
    label: "Spring PetClinic ecosystem"
    upstream: spring-projects/spring-petclinic (family)
    shared_initial_commit: 349fdef18bcf (backend + microservices; angular differs)
    reason: >
      Three repos for the same application ecosystem: Angular frontend,
      Spring Boot backend monolith, and distributed microservices variant.
    repos:
      - app_petclinic-angular        # from spring-petclinic/spring-petclinic-angular
      - app_petclinic-backend        # from spring-projects/spring-petclinic
      - app_petclinic-microservices  # from spring-petclinic/spring-petclinic-microservices

  C4:
    label: "Modular Monolith with DDD (kgrzybek)"
    upstream: kgrzybek/modular-monolith-with-ddd
    shared_initial_commit: null  # different roots, same upstream project
    reason: >
      Backend (.NET) and frontend (React) from the same upstream project,
      split into two repos by the upstream author.
    repos:
      - dotnet-modular-monolith          # backend — kgrzybek/modular-monolith-with-ddd
      - dotnet-modular-monolith-fe-react # frontend — kgrzybek/modular-monolith-with-ddd-fe-react

  C5:
    label: "Cal.com ecosystem"
    upstream: calcom/cal.com
    shared_initial_commit: null  # app is fork; infra + dataeng are original
    reason: >
      The main cal.com app plus infrastructure and data engineering repos
      built around it for workshop demos.
    repos:
      - cal.com           # fork of calcom/cal.com
      - cal.com-infra     # original — AWS CDK infra for cal.com
      - cal.com-dataeng   # original — data engineering for cal.com

  C6:
    label: "EventFlow multi-service demo"
    upstream: null  # all scaffolded from scratch
    shared_initial_commit: null
    reason: >
      Five-repo event-driven architecture demo: order service, payment
      service, storefront, infrastructure, and Devin integration tooling.
    repos:
      - app_eventflow-order-service
      - app_eventflow-payment-service
      - app_eventflow-storefront
      - app_eventflow-infra
      - app_eventflow-devin-integration

  C7:
    label: "Apache Fineract ecosystem"
    upstream: apache/fineract
    shared_initial_commit: null  # backend + frontend have different roots
    reason: >
      Backend (Apache Fineract) and frontend (Mifos web app) from the
      same banking platform ecosystem.
    repos:
      - fineract                # fork of apache/fineract
      - mifos-fineract-web-app  # fork of openMF/web-app

  C8:
    label: "Client Timesheet App"
    upstream: null  # original
    shared_initial_commit: null
    reason: >
      The timesheet application and its hosting/infrastructure repo.
    repos:
      - app_timesheet          # the app itself
      - hosting-client-timesheet-app  # Terraform infra for deploying it

  C9:
    label: "AngularJS 1.x admin demos"
    upstream: null  # different upstreams
    shared_initial_commit: null
    reason: >
      Two AngularJS 1.x admin dashboard repos for framework migration demos
      (AngularJS -> Angular/React). Different upstream sources but same
      technology and purpose.
    repos:
      - angular-1.x-bootstrap-admin-dashboard  # from akveo/blur-admin
      - angular-1.x-dashboard                  # from dtpublic/malhar-angular-dashboard

  C10:
    label: "SAS to Snowflake migration"
    upstream: scottbass/SAS
    shared_initial_commit: null
    reason: >
      Legacy SAS source codebase paired with the Snowflake migration
      validation tooling built for demos.
    repos:
      - ts-sas-legacy-codebase            # SAS source (from scottbass/SAS)
      - uc-data-migration-sas-to-snowflake  # migration validation tooling

  C11:
    label: "OrderManager Monolith-to-Microservices"
    upstream: null
    shared_initial_commit: null
    reason: >
      Platform standard + .NET/Angular monolith + service IaC for
      decomposition demos. Platform repo provides the shared EKS/ArgoCD/
      monitoring infrastructure; app repos demonstrate monolith-to-
      microservices conforming to platform standard.
    repos:
      - platform-engineering-shared-services
      - app_dotnet-angular-monolith
      - app_dotnet-angular-monolith-iac

  C12:
    label: ".NET/Angular Containerized Decomposition"
    upstream: null
    shared_initial_commit: null
    reason: >
      Four-repo decomposition workshop: before-state monolith (imported
      from QuickApp), target-state .NET microservices, target-state Angular
      micro-frontends, and app-specific IaC for Kubernetes deployment.
    repos:
      - app_dotnet_angular_containerized_decomposition_monolith
      - app_dotnet_angular_containerized_decomposition_microservices
      - app_dotnet_angular_containerized_decomposition_microfrontends
      - app_dotnet_angular_containerized_decomposition_iac

